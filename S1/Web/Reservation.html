    <main>
        <section>
            <h1>Le formulaire des questions incontournables</h1>
            <article>
                <form 
                    action="https://webdev.iut-orsay.fr/r102/tests/formulaire/test_formulaire.php"
                    method="post">
					
                    <label for="u_name">Nom</label>
                    <input id="u_name" name="Nom" type="text" required placeholder="Nom" maxlength="50">
                    
                    <label for="u_firstname">Prénom</label>
                    <input id="u_firstname" name="Prénom" type="text" required placeholder="Prénom" maxlength="50">
                    
                    <label for="u_phone">Numéro</label>
                    <input id="u_phone" name="Numéro de téléphone" type="tel" required placeholder="Numéro de téléphone" 
                           pattern="[0-9]{10}" maxlength="10">
						   
                    <label for="u_email">Email</label>
                    <input id="u_email" name="Email" type="email" required placeholder="Email">
					
                    <label for="u_city">Ville</label>
                    <input id="u_city" name="Ville" type="text" required placeholder="Ville" maxlength="50">
                    <br><br>
                    <input type="submit" value="Envoyer">
                    <input type="reset" value="Annuler">
                </form>
            </article>
        </section>
